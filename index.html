  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

,0.12); border-radius:20px; box-shadow:0 1px 0 rgba(47,74,58,0.05), 0 1px 2px rgba(47,74,58,0.05);\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; gap:8px;\">\n                <span style=\"display:inline-flex; align-items:center; gap:7px; font-weight:600; font-size:10.5px; letter-spacing:0.12em; text-transform:uppercase; color:#7A8B7E;\"><span style=\"{{ p.dotStyle }}\"><\u002Fspan>{{ p.catShort }}<\u002Fspan>\n                <span style=\"{{ p.stockStyle }}\">{{ p.stock }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:4px;\">\n                <span style=\"font-weight:200; font-size:24px; line-height:1.1; letter-spacing:-0.015em; color:#2F4A3A;\">{{ p.name }}<\u002Fspan>\n                <span style=\"font-weight:200; font-size:13px; color:#7A8B7E;\">{{ p.dose }} · {{ p.form }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex; align-items:baseline; justify-content:space-between; gap:8px; margin-top:auto; padding-top:12px; border-top:1px solid rgba(47,74,58,0.08);\">\n                <span style=\"font-weight:600; font-size:20px; color:#2F4A3A;\">{{ p.unitFmt }}<\u002Fspan>\n                <sc-if value=\"{{ mostrarCaja }}\" hint-placeholder-val=\"{{ true }}\">\n                  <span style=\"font-weight:200; font-size:12.5px; color:#7A8B7E; white-space:nowrap;\">caja ×10 · {{ p.boxFmt }}<\u002Fspan>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fmain>\n\n    <footer data-screen-label=\"Pie\" style=\"margin-top:56px; padding-top:24px; border-top:1px solid rgba(47,74,58,0.12); display:flex; justify-content:space-between; gap:24px; flex-wrap:wrap;\">\n      <p style=\"margin:0; max-width:620px; font-weight:200; font-size:12.5px; line-height:1.6; color:#7A8B7E; text-wrap:pretty;\">Precios mayoristas orientativos ══════════════════════════════════════════════════════\n// CÓMO AGREGAR UN PRODUCTO NUEVO\n// Añade una línea al final de la lista RAW de abajo, con este formato:\n//\n//   [ categoría, 'Nombre', 'Dosis', precioUnitario, forma?, stock? ],\n//\n//   1. categoría  →  usa una de estas claves (columna 'key' en CATS, arriba):\n//                    'rep' 'skin' 'meta' 'gh' 'long' 'neuro'\n//   2. Nombre     →  texto entre comillas, p. ej. 'BPC-157'\n//   3. Dosis      →  texto entre comillas, p. ej. '5 mg'\n//   4. precio     →  número sin símbolo, p. ej. 24  (el precio por caja ×10\n//                    se calcula solo; el SKU también se asigna solo)\n//   5. forma      →  OPCIONAL. Si se omite, queda 'Vial liofilizado'.\n//                    Para escribirla: pon null en su lugar o el texto, p. ej.\n//                    'Cápsulas orales'\n//   6. stock      →  OPCIONAL. Si se omite, queda 'En stock'.\n//                    Usa ORDER (Bajo pedido) o OUT (Agotado). Ejemplo con\n//                    forma por defecto + agotado:  [..., 90, null, OUT]\n//\n// Ejemplos:\n//   ['skin', 'Matrixyl 3000', '30 mg', 28],                 // lo mínimo\n//   ['meta', 'Tirzepatida', '60 mg', 480, null, ORDER],     // bajo pedido\n//   ['gh',   'MK-677', '25 mg', 32, 'Cápsulas orales'],     // otra forma\n//\n// Para crear una CATEGORÍA nueva, agrega una fila a CATS (arriba) con su\n// key, label, short y un color (dot), y luego úsala en la columna 1.\n// ═══════════════════════════════════════════════════════════════════\n// [cat, nombre, dosis, precio unitario, forma?, stock?]\nconst RAW = [\n  ['rep',  'BPC-157', '10 mg', 45, null, null, 380],\n  ['rep',  'TB-500 (Timosina β4)', '10 mg', 60, null, null, 565],\n  ['rep',  'BPC-157 + TB-500 (Wolverine Stack)', '10 mg', 70],\n  ['rep',  'GHK-Cu (cobre)', '50 mg', 65, null, null, 578],\n  ['skin', 'GHK-Cu (cobre)', '100 mg', 85, null, null, 756],\n  ['skin', 'Melanotan II', '10 mg', 65, null, null, 578],\n  ['meta', 'Tirzepatida', '10 mg', 85, null, null, 765],\n  ['meta', 'Tirzepatida', '30 mg', 120, null, null, 1100],\n  ['meta', 'Retatrutida', '10 mg', 80, null, null, 699],\n  ['meta', 'Retatrutida', '15 mg', 95, null, null, 850],\n  ['meta', 'AOD-9604', '10 mg', 85, null, null, 756],\n  ['meta', 'Tesamorelina', '10 mg', 120, null, null, 1068],\n  ['meta', 'MOTS-c', '10 mg', 75, null, null, 667],\n  ['meta', '5-Amino-1MQ', '10 mg', 65, null, null, 578],\n  ['meta', 'Tirzepen', '60 mg', 375, 'Pluma precargada', null, 'NA'],\n  ['gh',   'Ipamorelina', '10 mg', 75, null, null, 667],\n  ['gh',   'CJC-1295 con DAC', '10 mg', 78, null, null, 690],\n  ['gh',   'CJC-1295 + Ipamorelina', '10 mg', 75, null, null, 667],\n  ['long', 'Epitalon', '10 mg', 65, null, null, 500],\n  ['long', 'NAD+', '500 mg', 75, null, null, 700],\n  ['long', 'Selank', '5 mg', 65, null, null, 580],\n  ['long', 'Semax', '40 mg', 85, null, null, 780],\n  ['long', 'DSIP', '10 mg', 65, null, null, 578.5],\n  ['neuro','PT-141 (Bremelanotida)', '10 mg', 61, null, null, 580],\n  ['neuro','Kisspeptina-10', '10 mg', 81, null, null, 700],\n];\n\nconst STOCK_STYLES = {\n  'En stock':    { color: '#2F4A3A', bg: 'rgba(74,107,82,0.14)' },\n  'Bajo pedido': { color: '#8A6F2E', bg: 'rgba(201,165,92,0.20)' },\n  'Agotado':     { color: '#A14E45', bg: 'rgba(161,78,69,0.12)' },\n};\n\nclass Component extends DCLogic {\n  state = { q: '', cat: 'all', layout: 'tabla', sortKey: 'name', sortDir: 1, unlocked: false, pw: '', pwError: false };\n\n  componentDidMount() {\n    try {\n      if (sessionStorage.getItem('rea_precios_ok') === '1') this.setState({ unlocked: true });\n    } catch (e) {}\n  }\n\n  submitPw = () => {\n    const clave = String(this.props.clave ?? 'REAWOMENPEPTWHOLESALE2026');\n    if (this.state.pw.trim() === clave) {\n      try { sessionStorage.setItem('rea_precios_ok', '1'); } catch (e) {}\n      this.setState({ unlocked: true, pwError: false });\n    } else {\n      this.setState({ pwError: true });\n    }\n  };\n\n  renderVals() {\n    const sym = this.props.moneda ?? '$';\n    const money = (n) => sym + n.toLocaleString('es-ES');\n    const mostrarCaja = this.props.mostrarCaja ?? true;\n    const catMap = {};\n    CATS.forEach((c) => { catMap[c.key] = c; });\n\n    const dotCss = (color) => 'display:inline-block; width:7px; height:7px; border-radius:999px; flex:none; background:' + color + ';';\n\n    const all = RAW.map((r, i) => {\n      const cat = catMap[r[0]];\n      const stock = r[5] || 'En stock';\n      const ss = STOCK_STYLES[stock];\n      const noBox = r[6] === 'NA';\n      const box = noBox ? null : (typeof r[6] === 'number' ? r[6] : Math.round((r[3] * 10 * 0.92) / 5) * 5);\n      return {\n        sku: 'REA-' + (1001 + i),\n        name: r[1], dose: r[2], unit: r[3],\n        form: r[4] || 'Vial liofilizado',\n        cat: r[0], catLabel: cat.label, catShort: cat.short,\n        dotStyle: dotCss(cat.dot),\n        stock,\n        stockStyle: 'display:inline-flex; align-items:center; padding:4px 11px; border-radius:999px; font-weight:600; font-size:11px; letter-spacing:0.02em; white-space:nowrap; color:' + ss.color + '; background:' + ss.bg + ';',\n        unitFmt: money(r[3]), boxFmt: box == null ? '—' : money(box),\n        _s: (r[1] + ' ' + r[2] + ' ' + cat.label + ' ' + cat.short).toLowerCase(),\n      };\n    });\n\n    const q = this.state.q.trim().toLowerCase();\n    let filtered = all.filter((p) =>\n      (this.state.cat === 'all' || p.cat === this.state.cat) && (!q || p._s.includes(q))\n    );\n    const dir = this.state.sortDir;\n    filtered = filtered.slice().sort((a, b) =>\n      this.state.sortKey === 'unit' ? (a.unit - b.unit) * dir : a.name.localeCompare(b.name, 'es') * dir\n    );\n\n    const groups = CATS\n      .map((c) => {\n        const items = filtered.filter((p) => p.cat === c.key);\n        return { label: c.label, n: items.length, dotStyle: 'display:inline-block; width:10px; height:10px; border-radius:999px; flex:none; align-self:center; background:' + c.dot + ';', items };\n      })\n      .filter((g) => g.items.length > 0);\n\n    const chips = [{ key: 'all', short: 'Todos', dot: '#4A6B52' }].concat(CATS).map((c) => {\n      const active = this.state.cat === c.key;\n      return {\n        short: c.short,\n        on: () => this.setState({ cat: c.key }),\n        dotStyle: dotCss(active ? '#BCC8A8' : c.dot),\n        style: 'display:inline-flex; align-items:center; gap:7px; padding:7px 14px; border-radius:999px; font-family:inherit; font-weight:600; font-size:12.5px; cursor:pointer; transition:all 240ms cubic-bezier(0.22,0.61,0.36,1); backdrop-filter:blur(10px); border:1px solid ' + (active ? 'rgba(255,255,255,0.36)' : 'rgba(47,74,58,0.18)') + '; background:' + (active ? 'rgba(47,74,58,0.88)' : 'rgba(251,247,242,0.6)') + '; color:' + (active ? '#F6EFE6' : '#4A5C4E') + '; box-shadow:' + (active ? '0 10px 32px -12px rgba(47,74,58,0.30), inset 0 1px 0 rgba(255,255,255,0.20)' : 'none') + ';',\n      };\n    });\n\n    const segs = [['tabla', 'Tabla'], ['catalogo', 'Catálogo'], ['tarjetas', 'Tarjetas']].map(([key, label]) => {\n      const active = this.state.layout === key;\n      return {\n        label,\n        on: () => this.setState({ layout: key }),\n        style: 'padding:8px 18px; border-radius:999px; border:none; font-family:inherit; font-weight:600; font-size:12.5px; cursor:pointer; transition:all 240ms cubic-bezier(0.22,0.61,0.36,1); background:' + (active ? '#2F4A3A' : 'transparent') + '; color:' + (active ? '#F6EFE6' : '#4A5C4E') + ';',\n      };\n    });\n\n    const cols = mostrarCaja ? '1fr 180px 120px 100px 110px' : '1fr 200px 150px 120px';\n    const base = 'display:grid; grid-template-columns:' + cols + '; gap:16px; padding:15px 26px; align-items:center;';\n\n    return {\n      bloqueado: !this.state.unlocked,\n      pwError: this.state.pwError,\n      setPw: (e) => this.setState({ pw: e.target.value, pwError: false }),\n      onPwKey: (e) => { if (e.key === 'Enter') this.submitPw(); },\n      submitPw: this.submitPw,\n      setQ: (e) => this.setState({ q: e.target.value }),\n      chips, segs, filtered, groups,\n      count: filtered.length, total: all.length,\n      vacio: filtered.length === 0,\n      isTabla: this.state.layout === 'tabla' && filtered.length > 0,\n      isCatalogo: this.state.layout === 'catalogo' && filtered.length > 0,\n      isTarjetas: this.state.layout === 'tarjetas' && filtered.length > 0,\n      mostrarCaja,\n      soloProfesional: this.props.soloProfesional ?? true,\n      headStyle: base + ' background:#EFE6D6; border-bottom:1px solid rgba(47,74,58,0.12); font-weight:600; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:#7A8B7E;',\n      rowStyle: base + ' border-top:1px solid rgba(47,74,58,0.08);',\n      sortName: () => this.setState((s) => ({ sortKey: 'name', sortDir: s.sortKey === 'name' ? -s.sortDir : 1 })),\n      sortUnit: () => this.setState((s) => ({ sortKey: 'unit', sortDir: s.sortKey === 'unit' ? -s.sortDir : 1 })),\n      sortNameInd: this.state.sortKey === 'name' ? (this.state.sortDir > 0 ? '↑' : '↓') : '',\n      sortUnitInd: this.state.sortKey === 'unit' ? (this.state.sortDir > 0 ? '↑' : '↓') : '',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
